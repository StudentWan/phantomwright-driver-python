name: Patchright Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Playwright Version (e.g. `v1.58.0`)'
        required: true
      patchright_release:
        description: 'Phantomwright Driver Release Version (e.g. `1.58.0`)'
        required: true
      pypi_version:
        description: 'PyPI Publish Version (e.g. `1.58.3`)'
        required: true

env:
  REPO: ${{ github.repository }}

jobs:
  patchright-release-workflow:
    name: "Patchright-Python Workflow: Install, Patch, Build and Publish Patchright Python Package"
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/phantomwright-driver
    permissions:
      contents: write
      id-token: write # For trusted Publishing
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Check Release Version
        id: version_check
        run: |
          echo "patchright_release=${{ github.event.inputs.patchright_release }}" >> $GITHUB_ENV
          echo "pypi_version=${{ github.event.inputs.pypi_version }}" >> $GITHUB_ENV
          echo "playwright_version=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "playwright_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Install Playwright-Python Package
        if: steps.version_check.outputs.proceed == 'true'
        run: |
          uv sync --all-groups
          git clone https://github.com/microsoft/playwright-python --branch "$playwright_version"
          uv add -r playwright-python/local-requirements.txt --dev

      - name: Patch Playwright-Python Package
        if: steps.version_check.outputs.proceed == 'true'
        run: |
          uv run patch_python_package.py
          uvx ruff format playwright-python

      - name: Build Patchright-Python Package
        if: steps.version_check.outputs.proceed == 'true'
        run: |
          cd playwright-python
          uv pip install -e .
          for wheel in $(uv run setup.py --list-wheels); do
            PLAYWRIGHT_TARGET_WHEEL=$wheel uv build --wheel
          done

      - name: Create Empty Versioning Release
        if: steps.version_check.outputs.proceed == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.pypi_version }}
          release_name: ${{ github.event.inputs.pypi_version }}
          body: |
            This is a manual deployment based on [microsoft/playwright-python](https://github.com/microsoft/playwright-python) ${{ github.event.inputs.version }}.
            This Release is only used for Versioning.
          draft: false
          prerelease: false

      - name: Publish Patchright-Python Package
        if: steps.version_check.outputs.proceed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: playwright-python/dist/
          verbose: true
